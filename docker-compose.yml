services:
  nginx:
    image: nginx:alpine
    ports:
      - "${PORT:-3080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - VLLM_BASE_URL=${VLLM_BASE_URL:-http://host.docker.internal:7777}
      - VLLM_MODEL=${VLLM_MODEL:-Qwen/Qwen3.5-9B}
      - DATABASE_PATH=data/chat.db
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
    volumes:
      - simon-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOST=0.0.0.0
      - ORIGIN=${ORIGIN:-http://localhost:3080}
    restart: unless-stopped

volumes:
  simon-data:
